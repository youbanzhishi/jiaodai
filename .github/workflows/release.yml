name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: jiaodai-linux-amd64
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact: jiaodai-macos-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: jiaodai-macos-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: jiaodai-windows-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build
        run: cargo build --release -p jiaodai-cli --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/jiaodai dist/
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz jiaodai

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/jiaodai.exe dist/
          cd dist
          7z a ${{ matrix.artifact }}.zip jiaodai.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag
        run: |
          TAG="v$(date +%Y%m%d-%H%M%S)"
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: artifacts/**/*
